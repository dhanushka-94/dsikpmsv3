name: Bump software version

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: Changelog notes (one change)
        required: true
        type: string
      title:
        description: Optional release title
        required: false
        type: string

  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip version]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if version.json already updated in this push
        id: guard
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qx 'version.json'; then
            echo "version.json already changed in this push — skipping auto bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.skip != 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer dependencies
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.skip != 'true'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Determine bump details
        id: meta
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "level=${{ inputs.level }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ inputs.title }}" >> "$GITHUB_OUTPUT"
            NOTES=$(printf '%s' '${{ inputs.notes }}' | tr '\n' ' ' | cut -c1-240)
            echo "notes=$NOTES" >> "$GITHUB_OUTPUT"
          else
            MSG=$(git log -1 --pretty=%s | tr '\n' ' ' | cut -c1-180)
            echo "level=patch" >> "$GITHUB_OUTPUT"
            echo "title=GitHub update" >> "$GITHUB_OUTPUT"
            echo "notes=$MSG" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.skip != 'true'
        run: |
          php artisan software:bump "${{ steps.meta.outputs.level }}" \
            --title="${{ steps.meta.outputs.title }}" \
            --notes="${{ steps.meta.outputs.notes }}"

      - name: Commit version.json
        if: github.event_name == 'workflow_dispatch' || steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff --cached --quiet; then
            echo "No version change to commit."
            exit 0
          fi
          VERSION=$(php -r "echo json_decode(file_get_contents('version.json'), true)['version'];")
          git commit -m "chore: bump software version to v${VERSION} [skip version]"
          git push
